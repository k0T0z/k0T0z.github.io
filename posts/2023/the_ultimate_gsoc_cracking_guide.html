<!DOCTYPE html>

<html>

<head>
    <meta content-type="text/html">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Personal website" />
    <link rel="stylesheet" href="../../css/index.css">

    <link rel="icon" type="image/jpeg" href="../../assets/main-logo.jpeg">

    <title></title>
</head>

<body>
    <header class="site-header" role="banner">
        <div class="wrapper">
            <div id="site-header-h-card">
                <img id="site-header-avatar" src="../../assets/main-logo.jpeg" alt="k0T0z avatar" />
                <div id="site-header-v-card">
                    <a class="site-title" rel="author" href="../../index.html">k0T0z</a>
                    <span id="what-is-this">
                        Just a place for me to dump my thoughts.
                    </span>
                </div>
            </div>
        </div>
    </header>

    <main class="page-content" aria-label="Content">
        <div id="post-main-wrapper" class="wrapper">
            <article class="post h-entry" itemscope itemtype="http://schema.org/BlogPosting">

                <header class="post-header">
                    <h1 id="post-title" class="post-title p-name" itemprop="name headline"></h1>
                    <span class="post-meta">
                        <time id="post-created-on-date" class="dt-published" itemprop="datePublished">
                            <span class="spinner"></span><span class="post-meta-placeholder">Fetching date...</span>
                        </time>
                    </span>
                </header>

                <div class="post-content e-content" itemprop="articleBody">
                    <p>
                        Before getting accepted:
                    <ul>
                        <li></li>
                    </ul>
                    </p>
                    <p>
                        After getting accepted:
                    <ul>
                        <li>
                            Ask your mentor for a recommomendation letter. Don't forget to ask hime to add his
                            information to the letter as well.
                        </li>
                    </ul>
                    </p>
                </div>

                <a id="u-url-id" class="u-url" hidden></a>
            </article>
        </div>
    </main>
    <script src="../../js/posts.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="js/the_ultimate_gsoc_cracking_guide.js"></script>
    <script src="../../js/posts-utils.js"></script>
</body>

</html>
