<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 64 64" xml:space="preserve" fill="#000000">
    <circle cx="32" cy="32" r="24" fill="none" stroke-width="4" stroke="#000000"></circle>
    <circle cx="32" cy="32" r="24" fill="none" stroke-width="4" stroke="#000000">
        <animate attributeName="r" from="24" to="0" dur="1s" begin="0s" repeatCount="indefinite"></animate>
        <animate attributeName="opacity" from="1" to="0" dur="1s" begin="0s" repeatCount="indefinite"></animate>
    </circle>
